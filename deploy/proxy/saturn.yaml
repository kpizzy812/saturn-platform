# =============================================================================
# Saturn Platform - Traefik Dynamic Configuration (Multi-Environment)
# =============================================================================
# Routes traffic to 3 isolated Saturn environments.
# Place this file at /data/saturn/proxy/dynamic/saturn.yaml on VPS.
#
# Domains:
#   dev.saturn.ac    → saturn-dev:8080     (development)
#   uat.saturn.ac    → saturn-staging:8080  (staging)
#   saturn.ac        → saturn-production:8080 (production)
# =============================================================================

http:
  middlewares:
    # Allow only Cloudflare edge IPs — blocks direct access to the real server IP.
    # Cloudflare IP ranges: https://www.cloudflare.com/ips/
    cloudflare-only:
      ipAllowList:
        sourceRange:
          # IPv4
          - 173.245.48.0/20
          - 103.21.244.0/22
          - 103.22.200.0/22
          - 103.31.4.0/22
          - 141.101.64.0/18
          - 108.162.192.0/18
          - 190.93.240.0/20
          - 188.114.96.0/20
          - 197.234.240.0/22
          - 198.41.128.0/17
          - 162.158.0.0/15
          - 104.16.0.0/13
          - 104.24.0.0/14
          - 172.64.0.0/13
          - 131.0.72.0/22
          # IPv6
          - 2400:cb00::/32
          - 2606:4700::/32
          - 2803:f800::/32
          - 2405:b500::/32
          - 2405:8100::/32
          - 2a06:98c0::/29
          - 2c0f:f248::/32

    redirect-to-https:
      redirectscheme:
        scheme: https
    gzip:
      compress: true
    security-headers:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: nosniff
          X-Frame-Options: SAMEORIGIN
          Referrer-Policy: strict-origin-when-cross-origin
          X-XSS-Protection: "1; mode=block"
    hsts-headers:
      headers:
        customResponseHeaders:
          Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
    # Rate limiting: 300 req/min per IP, burst 100.
    # Protects PHP/Laravel layer from flood and brute-force before the request reaches the app.
    # WebSocket routers (realtime, terminal) are intentionally excluded —
    # they perform a single HTTP upgrade and then hold a long-lived connection.
    rate-limit:
      rateLimit:
        average: 300
        period: 1m
        burst: 100
        sourceCriterion:
          ipStrategy:
            depth: 1

  # ===========================================================================
  # Monitoring — status.saturn.ac → saturn-uptime (Uptime Kuma)
  # ===========================================================================
  routers:
    monitoring-http:
      middlewares:
        - cloudflare-only
        - redirect-to-https
      entryPoints:
        - http
      service: uptime-kuma
      rule: Host(`status.saturn.ac`)

    monitoring-https:
      entryPoints:
        - https
      service: uptime-kuma
      rule: Host(`status.saturn.ac`)
      middlewares:
        - cloudflare-only
        - security-headers
        - gzip
      tls:
        certresolver: letsencrypt

  # ===========================================================================
  # Development — dev.saturn.ac → saturn-dev
  # ===========================================================================
    # HTTP → HTTPS redirect
    dev-http:
      middlewares:
        - cloudflare-only
        - redirect-to-https
      entryPoints:
        - http
      service: dev-app
      rule: Host(`dev.saturn.ac`)

    # App HTTPS
    dev-https:
      entryPoints:
        - https
      service: dev-app
      rule: Host(`dev.saturn.ac`)
      middlewares:
        - cloudflare-only
        - security-headers
        - gzip
        - rate-limit
      tls:
        certresolver: letsencrypt

    # WebSocket HTTPS
    dev-realtime-wss:
      entryPoints:
        - https
      service: dev-realtime
      rule: 'Host(`dev.saturn.ac`) && PathRegexp(`^/app/[a-zA-Z0-9]+$`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

    # Terminal WebSocket HTTPS
    dev-terminal-wss:
      entryPoints:
        - https
      service: dev-terminal
      rule: 'Host(`dev.saturn.ac`) && PathPrefix(`/terminal/ws`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

  # ===========================================================================
  # Staging (UAT) — uat.saturn.ac → saturn-staging
  # ===========================================================================
    staging-http:
      middlewares:
        - cloudflare-only
        - redirect-to-https
      entryPoints:
        - http
      service: staging-app
      rule: Host(`uat.saturn.ac`)

    staging-https:
      entryPoints:
        - https
      service: staging-app
      rule: Host(`uat.saturn.ac`)
      middlewares:
        - cloudflare-only
        - security-headers
        - gzip
        - rate-limit
      tls:
        certresolver: letsencrypt

    staging-realtime-wss:
      entryPoints:
        - https
      service: staging-realtime
      rule: 'Host(`uat.saturn.ac`) && PathRegexp(`^/app/[a-zA-Z0-9]+$`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

    staging-terminal-wss:
      entryPoints:
        - https
      service: staging-terminal
      rule: 'Host(`uat.saturn.ac`) && PathPrefix(`/terminal/ws`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

  # ===========================================================================
  # Production — saturn.ac → saturn-production
  # ===========================================================================
    production-http:
      middlewares:
        - cloudflare-only
        - redirect-to-https
      entryPoints:
        - http
      service: production-app
      rule: Host(`saturn.ac`)

    production-https:
      entryPoints:
        - https
      service: production-app
      rule: Host(`saturn.ac`)
      middlewares:
        - cloudflare-only
        - security-headers
        - hsts-headers
        - gzip
        - rate-limit
      tls:
        certresolver: letsencrypt

    production-realtime-wss:
      entryPoints:
        - https
      service: production-realtime
      rule: 'Host(`saturn.ac`) && PathRegexp(`^/app/[a-zA-Z0-9]+$`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

    production-terminal-wss:
      entryPoints:
        - https
      service: production-terminal
      rule: 'Host(`saturn.ac`) && PathPrefix(`/terminal/ws`)'
      middlewares:
        - cloudflare-only
      tls:
        certresolver: letsencrypt

  # ===========================================================================
  # Services
  # ===========================================================================
  services:
    # Monitoring (Gatus)
    uptime-kuma:
      loadBalancer:
        servers:
          - url: 'http://saturn-gatus:8080'

    # Dev
    dev-app:
      loadBalancer:
        servers:
          - url: 'http://saturn-dev:8080'
    dev-realtime:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-dev:6001'
    dev-terminal:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-dev:6002'

    # Staging
    staging-app:
      loadBalancer:
        servers:
          - url: 'http://saturn-staging:8080'
    staging-realtime:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-staging:6001'
    staging-terminal:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-staging:6002'

    # Production
    production-app:
      loadBalancer:
        servers:
          - url: 'http://saturn-production:8080'
    production-realtime:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-production:6001'
    production-terminal:
      loadBalancer:
        servers:
          - url: 'http://saturn-realtime-production:6002'
